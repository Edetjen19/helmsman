# Two processes, one SQLite store (BUILD_PLAN §5.1). No service sprawl.
#   web   , FastAPI ingest (HMAC webhook) + the ops dashboard
#   worker, the reconciler loop (dispatch, poll, verify, self-heal)
# Both share ./data (the SQLite file, WAL mode) and .env. SIMULATE=true lives in .env,
# so `docker compose up` runs the full loop with zero real ACU.

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uvicorn src.ingest.app:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python -m src.reconciler
    env_file: .env
    volumes:
      - .:/app
      - /app/__pycache__
    depends_on:
      - web
    restart: unless-stopped
